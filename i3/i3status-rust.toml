icons_format = "{icon}"

[theme]
theme = "native"

[icons]
icons = "awesome4"

[[block]]
block = "cpu"
interval = 5
format = " $icon $utilization.eng(w:2) "

[[block]]
block = "memory"
format = " $icon $mem_used_percents.eng(w:2) "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 60
warning = 20.0
alert = 10.0
format = " $icon $available.eng(w:2) "

[[block]]
block = "time"
interval = 5
# Do not depend on the environment inherited by the display manager.
timezone = "Europe/Stockholm"
format = " $timestamp.datetime(f:'%a %d %b %R') "
